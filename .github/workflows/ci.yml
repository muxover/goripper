name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "release-notes/**"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "release-notes/**"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ["1.24", "1.25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -timeout 120s ./...
